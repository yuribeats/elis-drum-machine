<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI'S DRUM MACHINE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #1a6fc4;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            user-select: none;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 0;
        }

        .scale-wrap {
            transform-origin: center center;
            position: relative;
            z-index: 1;
        }

        .machine {
            width: 1000px;
            background: linear-gradient(180deg, #FFCB05 0%, #F5C000 100%);
            border: 3px solid #1a1a1a;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
            position: relative;
        }

        /* POKEBALL STRIPE */
        .stripe {
            height: 6px;
            background: #1a1a1a;
            position: relative;
        }
        .stripe::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            border: 4px solid #1a1a1a;
            z-index: 2;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 2px solid #1a1a1a;
            background: #E3350D;
        }
        .title-banner {
            font-size: 38px;
            font-weight: 900;
            font-style: italic;
            color: #fff;
            letter-spacing: 3px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
        }
        .brand {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .brand-name {
            font-size: 12px;
            color: #fff;
            letter-spacing: 4px;
        }
        .brand-model {
            font-size: 16px;
            color: #FFCB05;
            letter-spacing: 2px;
        }

        /* CONTROLS ROW */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            border-bottom: 2px solid #1a1a1a;
            background: #1a1a1a;
        }
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ctrl-label {
            font-size: 10px;
            color: #FFCB05;
            letter-spacing: 1px;
        }
        .ctrl-input {
            width: 50px;
            height: 22px;
            background: #0a0a0a;
            border: 1px solid #FFCB05;
            color: #FFCB05;
            font-family: Arial, sans-serif;
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            outline: none;
            padding: 0;
        }
        .ctrl-input:focus { border-color: #fff; }
        .ctrl-btn {
            height: 26px;
            padding: 0 14px;
            background: #333;
            border: 2px solid #555;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:active { background: #444; }
        .ctrl-btn.play-on {
            background: #2563EB;
            border-color: #3b82f6;
            color: #fff;
        }
        .ctrl-sep { width: 1px; height: 20px; background: #444; }
        .ctrl-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 60px;
            height: 4px;
            background: #0a0a0a;
            border: 1px solid #333;
            outline: none;
        }
        .ctrl-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 18px;
            background: #FFCB05;
            border: 2px solid #1a1a1a;
        }

        /* BEAT INDICATOR */
        .beat-row {
            display: flex;
            padding: 6px 20px 2px 156px;
            gap: 0;
        }
        .beat-num {
            width: 46px;
            text-align: center;
            font-size: 11px;
            color: #1a1a1a;
            letter-spacing: 1px;
        }
        .beat-num.group-start { color: #1a1a1a; font-weight: 900; }
        .beat-group-gap { width: 8px; }

        /* STEP GRID */
        .grid {
            padding: 4px 20px 12px 20px;
        }
        .track {
            display: flex;
            align-items: center;
            height: 36px;
            border-bottom: 1px solid rgba(0,0,0,0.15);
        }
        .track:last-child { border-bottom: none; }
        .track-label {
            width: 136px;
            font-size: 12px;
            color: #1a1a1a;
            letter-spacing: 1px;
            padding-right: 10px;
            text-align: right;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
        }

        /* DRUM PIECE ICON */
        .drum-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .drum-icon svg {
            width: 100%;
            height: 100%;
        }

        .track-vol {
            -webkit-appearance: none;
            appearance: none;
            width: 30px;
            height: 3px;
            background: rgba(0,0,0,0.3);
            outline: none;
        }
        .track-vol::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 8px;
            height: 12px;
            background: #1a1a1a;
            border: 1px solid #000;
        }

        /* MUTE: uses shape not just color */
        .track-mute {
            width: 14px;
            height: 14px;
            border: 2px solid #1a1a1a;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            line-height: 1;
            background: #fff;
        }
        .track-mute.muted {
            background: #1a1a1a;
            color: #FFCB05;
        }
        .track-mute.muted::after {
            content: 'X';
        }

        .steps {
            display: flex;
            gap: 0;
            flex: 1;
        }
        .step-group-gap { width: 8px; flex-shrink: 0; }

        /* ==========================================
           COLOR-BLIND SAFE STEP CELLS
           Blue (#2563EB) = ON
           Orange (#F59E0B) = ACCENT
           White = OFF
           Shape changes reinforce state
           ========================================== */
        .step {
            width: 46px;
            height: 30px;
            background: #fff;
            border: 2px solid #ccc;
            position: relative;
            transition: background 0.05s, border-color 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .step.on {
            background: #2563EB;
            border-color: #1d4ed8;
        }
        .step.on.accent {
            background: #F59E0B;
            border-color: #d97706;
        }

        /* Current step — thick white dashed border, visible on any color */
        .step.current {
            border: 2px dashed #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.6);
        }
        .step.on.current {
            border: 2px dashed #fff;
            box-shadow: 0 0 10px rgba(37,99,235,0.7);
        }
        .step.on.accent.current {
            box-shadow: 0 0 10px rgba(245,158,11,0.7);
        }

        /* POKEBALL DOT — OFF = small empty circle, ON = filled pokeball */
        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1.5px solid #bbb;
            background: transparent;
            position: relative;
        }
        /* ON: filled pokeball with visible halves */
        .step.on .step-dot {
            width: 14px;
            height: 14px;
            background: linear-gradient(180deg, #fff 0%, #fff 42%, #1a1a1a 42%, #1a1a1a 58%, #E3350D 58%, #E3350D 100%);
            border: 2px solid #fff;
            box-shadow: 0 0 4px rgba(255,255,255,0.8);
        }
        .step.on .step-dot::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #fff;
            border: 1px solid #1a1a1a;
        }
        .step.on.accent .step-dot {
            background: linear-gradient(180deg, #1a1a1a 0%, #1a1a1a 42%, #fff 42%, #fff 58%, #1a1a1a 58%, #1a1a1a 100%);
            border-color: #1a1a1a;
        }
        .step.on.accent .step-dot::after {
            background: #FFCB05;
            border-color: #1a1a1a;
        }

        /* PLAYHEAD ROW */
        .playhead-row {
            display: flex;
            padding: 0 20px 6px 156px;
            gap: 0;
        }
        .ph-cell {
            width: 46px;
            height: 5px;
            background: transparent;
        }
        .ph-cell.active {
            background: #fff;
            box-shadow: 0 0 8px #fff, 0 0 16px rgba(255,203,5,0.6);
        }
        .ph-group-gap { width: 8px; }

        /* FOOTER */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 20px;
            border-top: 2px solid #1a1a1a;
            background: #1a1a1a;
        }
        .footer-text {
            font-size: 9px;
            color: #FFCB05;
            letter-spacing: 1.5px;
        }

        /* Pattern selector */
        .pattern-btns {
            display: flex;
            gap: 3px;
        }
        .pat-btn {
            width: 24px;
            height: 18px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 11px;
            font-family: Arial, sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pat-btn.active-pat {
            background: #FFCB05;
            color: #1a1a1a;
            border-color: #1a1a1a;
        }

        /* KIT DROPDOWN */
        .kit-dropdown { position: relative; }
        .kit-selected {
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.3);
            color: #FFCB05;
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 8px;
            letter-spacing: 1px;
            min-width: 60px;
            text-align: center;
        }
        .kit-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border: 2px solid #444;
            border-top: none;
            z-index: 100;
        }
        .kit-menu.open { display: block; }
        .kit-option {
            padding: 5px 8px;
            font-size: 12px;
            font-weight: 700;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            color: #fff;
            letter-spacing: 1px;
        }
        .kit-option:hover { background: #333; color: #FFCB05; }
        .kit-option.active-kit { color: #FFCB05; }

        /* PIKACHU DECORATIONS */
        .pikachu-left {
            position: fixed;
            bottom: 0;
            left: 10px;
            width: 220px;
            z-index: 10;
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.5));
            transform-origin: bottom center;
            transition: transform 0.1s;
        }
        .pikachu-right {
            position: fixed;
            bottom: 0;
            right: 10px;
            width: 200px;
            z-index: 10;
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.5));
            transform-origin: bottom center;
            transition: transform 0.1s;
        }
        /* Bounce on kick */
        .pikachu-left.bounce {
            transform: scaleY(0.88) scaleX(1.08) translateY(4px);
        }
        /* Jump on snare */
        .pikachu-right.jump {
            transform: translateY(-20px) rotate(5deg);
        }
        /* Hat wiggle */
        .pikachu-left.wiggle {
            transform: rotate(-6deg);
        }
        .pikachu-right.wiggle {
            transform: rotate(6deg);
        }

        /* Lightning bolt ears on machine corners */
        .bolt-left, .bolt-right {
            position: absolute;
            top: -18px;
            font-size: 28px;
            z-index: 5;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.3));
        }
        .bolt-left { left: 15px; transform: rotate(-15deg); }
        .bolt-right { right: 15px; transform: rotate(15deg); }

        /* DRUM KIT DIAGRAM */
        .kit-diagram {
            position: relative;
            width: 260px;
            height: 180px;
            margin: 0 auto;
            display: none;
        }
        .kit-diagram.visible { display: block; }
        .kit-piece {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transition: transform 0.1s, filter 0.1s;
        }
        .kit-piece.hit {
            transform: scale(1.15);
            filter: drop-shadow(0 0 8px #FFCB05);
        }
        .kit-piece-shape {
            border: 2px solid #1a1a1a;
            background: #fff;
        }
        .kit-piece.hit .kit-piece-shape {
            background: #2563EB;
            border-color: #fff;
        }
        .kit-piece-label {
            font-size: 7px;
            color: #1a1a1a;
            letter-spacing: 0.5px;
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<img class="pikachu-left" src="images/pikachu1.png" alt="" />
<img class="pikachu-right" src="images/pikachu2.png" alt="" />

<div class="scale-wrap" id="scaleWrap">
<div class="machine">
    <span class="bolt-left">&#9889;</span>
    <span class="bolt-right">&#9889;</span>

    <div class="header">
        <div class="title-banner">ELI'S DRUM MACHINE</div>
        <div class="brand">
            <span class="brand-name" id="brandName">ROLAND</span>
            <span class="brand-model" id="brandModel">CR-78</span>
        </div>
        <div class="ctrl-group" style="margin-right:12px;position:relative">
            <span class="ctrl-label" style="color:#fff">KIT</span>
            <div class="kit-dropdown" id="kitDropdown">
                <div class="kit-selected" id="kitSelected">ELI'S KIT</div>
                <div class="kit-menu" id="kitMenu">
                    <div class="kit-option active-kit" data-kit="eli">ELI'S KIT</div>
                    <div class="kit-option" data-kit="cr78">CR-78</div>
                    <div class="kit-option" data-kit="lm2">LM-2</div>
                    <div class="kit-option" data-kit="mrk2">MRK-2</div>
                    <div class="kit-option" data-kit="tr505">TR-505</div>
                    <div class="kit-option" data-kit="tr909">TR-909</div>
                </div>
            </div>
        </div>
        <div class="pattern-btns">
            <div class="pat-btn active-pat" data-pat="0">A</div>
            <div class="pat-btn" data-pat="1">B</div>
            <div class="pat-btn" data-pat="2">C</div>
            <div class="pat-btn" data-pat="3">D</div>
        </div>
    </div>

    <div class="stripe"></div>

    <div class="controls">
        <div class="ctrl-group">
            <span class="ctrl-label">TEMPO</span>
            <input class="ctrl-input" id="tempoInput" type="number" min="40" max="300" value="120" />
        </div>
        <div class="ctrl-sep"></div>
        <div class="ctrl-group">
            <span class="ctrl-label">SWING</span>
            <input class="ctrl-slider" id="swingSlider" type="range" min="0" max="100" value="0" />
            <span class="ctrl-label" id="swingVal">0%</span>
        </div>
        <div class="ctrl-sep"></div>
        <div class="ctrl-group">
            <span class="ctrl-label">VOLUME</span>
            <input class="ctrl-slider" id="masterVol" type="range" min="0" max="100" value="80" />
        </div>
        <div class="ctrl-sep"></div>
        <div class="ctrl-btn" id="btnPlay">PLAY</div>
        <div class="ctrl-btn" id="btnStop">STOP</div>
        <div class="ctrl-sep"></div>
        <div class="ctrl-btn" id="btnClear">CLEAR</div>
        <div class="ctrl-btn" id="btnRandom">RANDOM</div>
        <div class="ctrl-sep"></div>
        <div class="ctrl-btn" id="btnCopy">COPY</div>
        <div class="ctrl-btn" id="btnPaste">PASTE</div>
        <div style="flex:1"></div>
        <div class="ctrl-group">
            <span class="ctrl-label" id="stepDisplay">STEP --</span>
        </div>
    </div>

    <!-- BEAT NUMBERS -->
    <div class="beat-row" id="beatRow"></div>

    <!-- PLAYHEAD -->
    <div class="playhead-row" id="playheadRow"></div>

    <!-- STEP GRID -->
    <div class="grid" id="grid"></div>

    <div class="footer">
        <span class="footer-text" id="footerSrc">SAMPLES: ORAMICS / CR-78 PUBLIC DOMAIN</span>
        <span class="footer-text">SPACE = PLAY/STOP &nbsp; SHIFT+CLICK = ACCENT</span>
    </div>
</div>
</div>

<script>
// ============================================
// DRUM PIECE SVG ICONS (for track labels)
// Maps track name keywords to simple SVG icons
// ============================================
const DRUM_ICONS = {
    kick: '<svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="none" stroke="#1a1a1a" stroke-width="2"/><circle cx="10" cy="10" r="3" fill="#1a1a1a"/></svg>',
    snare: '<svg viewBox="0 0 20 20"><ellipse cx="10" cy="10" rx="8" ry="5" fill="none" stroke="#1a1a1a" stroke-width="2"/><line x1="4" y1="8" x2="16" y2="12" stroke="#1a1a1a" stroke-width="1"/><line x1="4" y1="12" x2="16" y2="8" stroke="#1a1a1a" stroke-width="1"/></svg>',
    clap: '<svg viewBox="0 0 20 20"><ellipse cx="10" cy="10" rx="8" ry="5" fill="none" stroke="#1a1a1a" stroke-width="2"/><line x1="4" y1="8" x2="16" y2="12" stroke="#1a1a1a" stroke-width="1"/><line x1="4" y1="12" x2="16" y2="8" stroke="#1a1a1a" stroke-width="1"/></svg>',
    hat: '<svg viewBox="0 0 20 20"><ellipse cx="10" cy="8" rx="8" ry="3" fill="none" stroke="#1a1a1a" stroke-width="2"/><ellipse cx="10" cy="12" rx="8" ry="3" fill="none" stroke="#1a1a1a" stroke-width="2"/></svg>',
    cymbal: '<svg viewBox="0 0 20 20"><ellipse cx="10" cy="10" rx="9" ry="4" fill="none" stroke="#1a1a1a" stroke-width="2"/><circle cx="10" cy="10" r="1.5" fill="#1a1a1a"/></svg>',
    crash: '<svg viewBox="0 0 20 20"><ellipse cx="10" cy="10" rx="9" ry="4" fill="none" stroke="#1a1a1a" stroke-width="2"/><circle cx="10" cy="10" r="1.5" fill="#1a1a1a"/><line x1="6" y1="5" x2="8" y2="7" stroke="#1a1a1a" stroke-width="1.5"/><line x1="14" y1="5" x2="12" y2="7" stroke="#1a1a1a" stroke-width="1.5"/></svg>',
    ride: '<svg viewBox="0 0 20 20"><ellipse cx="10" cy="10" rx="9" ry="4" fill="none" stroke="#1a1a1a" stroke-width="2"/><circle cx="10" cy="10" r="1.5" fill="#1a1a1a"/></svg>',
    tom: '<svg viewBox="0 0 20 20"><ellipse cx="10" cy="7" rx="7" ry="3" fill="none" stroke="#1a1a1a" stroke-width="2"/><line x1="3" y1="7" x2="3" y2="14" stroke="#1a1a1a" stroke-width="2"/><line x1="17" y1="7" x2="17" y2="14" stroke="#1a1a1a" stroke-width="2"/><ellipse cx="10" cy="14" rx="7" ry="3" fill="none" stroke="#1a1a1a" stroke-width="2"/></svg>',
    rim: '<svg viewBox="0 0 20 20"><ellipse cx="10" cy="10" rx="8" ry="5" fill="none" stroke="#1a1a1a" stroke-width="2"/><line x1="16" y1="6" x2="4" y2="14" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/></svg>',
    cowbell: '<svg viewBox="0 0 20 20"><polygon points="6,4 14,4 16,16 4,16" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/></svg>',
    conga: '<svg viewBox="0 0 20 20"><ellipse cx="10" cy="5" rx="5" ry="2.5" fill="none" stroke="#1a1a1a" stroke-width="2"/><line x1="5" y1="5" x2="5" y2="16" stroke="#1a1a1a" stroke-width="2"/><line x1="15" y1="5" x2="15" y2="16" stroke="#1a1a1a" stroke-width="2"/><ellipse cx="10" cy="16" rx="5" ry="2.5" fill="none" stroke="#1a1a1a" stroke-width="2"/></svg>',
    bongo: '<svg viewBox="0 0 20 20"><ellipse cx="7" cy="10" rx="4" ry="6" fill="none" stroke="#1a1a1a" stroke-width="2"/><ellipse cx="14" cy="10" rx="4" ry="6" fill="none" stroke="#1a1a1a" stroke-width="2"/></svg>',
    tamb: '<svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" fill="none" stroke="#1a1a1a" stroke-width="2"/><circle cx="5" cy="10" r="1.5" fill="#1a1a1a"/><circle cx="15" cy="10" r="1.5" fill="#1a1a1a"/><circle cx="10" cy="5" r="1.5" fill="#1a1a1a"/></svg>',
    guiro: '<svg viewBox="0 0 20 20"><ellipse cx="10" cy="10" rx="8" ry="4" fill="none" stroke="#1a1a1a" stroke-width="2"/><line x1="6" y1="9" x2="6" y2="11" stroke="#1a1a1a" stroke-width="1.5"/><line x1="9" y1="9" x2="9" y2="11" stroke="#1a1a1a" stroke-width="1.5"/><line x1="12" y1="9" x2="12" y2="11" stroke="#1a1a1a" stroke-width="1.5"/></svg>',
    clave: '<svg viewBox="0 0 20 20"><line x1="3" y1="14" x2="10" y2="4" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/><line x1="10" y1="16" x2="17" y2="6" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/></svg>',

};

function getDrumIcon(trackName) {
    const n = trackName.toLowerCase();
    for (const key of Object.keys(DRUM_ICONS)) {
        if (n.includes(key)) return DRUM_ICONS[key];
    }
    // Default: simple circle
    return '<svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" fill="none" stroke="#1a1a1a" stroke-width="2"/></svg>';
}

let currentKit = 'eli';
let TRACKS = KITS[currentKit].tracks;
var STEPS = 16;
const NUM_PATTERNS = 4;

// ============================================
// STATE
// ============================================
let bpm = 120;
let swing = 0;
let playing = false;
let currentStep = -1;
let nextStepTime = 0;
let timerID = null;
let currentPattern = 0;

const allPatterns = {};
function initPatternsForKit(kitId) {
    if (allPatterns[kitId]) return;
    const kit = KITS[kitId];
    const pats = [];
    for (let p = 0; p < NUM_PATTERNS; p++) {
        const pat = [];
        for (let t = 0; t < kit.tracks.length; t++) pat.push(new Uint8Array(STEPS));
        pats.push(pat);
    }
    allPatterns[kitId] = pats;
}
initPatternsForKit(currentKit);
function patterns() { return allPatterns[currentKit]; }

let patternClipboard = null;

let trackVolumes = TRACKS.map(() => 0.8);
let trackMutes = TRACKS.map(() => false);

const actx = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = actx.createGain();
masterGain.gain.value = 0.8;
masterGain.connect(actx.destination);

const buffers = {};
let trackGains = [];

async function loadSamples() {
    const kit = KITS[currentKit];
    const url = SAMPLE_BASE + kit.path;
    document.getElementById('stepDisplay').textContent = 'LOADING...';
    const promises = TRACKS.map(async (track) => {
        const key = currentKit + '/' + track.file;
        if (buffers[key]) return;
        try {
            const resp = await fetch(url + track.file);
            const ab = await resp.arrayBuffer();
            buffers[key] = await actx.decodeAudioData(ab);
        } catch(e) { console.error('Failed to load', track.file, e); }
    });
    await Promise.all(promises);
    document.getElementById('stepDisplay').textContent = 'READY';
}

async function switchKit(kitId) {
    if (playing) stopSequencer();
    currentKit = kitId;
    TRACKS = KITS[kitId].tracks;
    initPatternsForKit(kitId);
    trackVolumes = TRACKS.map(() => 0.8);
    trackMutes = TRACKS.map(() => false);
    trackGains.forEach(g => g.disconnect());
    trackGains = [];
    for (let t = 0; t < TRACKS.length; t++) {
        const g = actx.createGain(); g.gain.value = 0.8;
        g.connect(masterGain); trackGains.push(g);
    }
    document.getElementById('brandName').textContent = KITS[kitId].name;
    document.getElementById('brandModel').textContent = KITS[kitId].model;
    document.getElementById('footerSrc').textContent = 'SAMPLES: ORAMICS / ' + KITS[kitId].model + ' PUBLIC DOMAIN';
    buildGrid();
    await loadSamples();
    scaleToFit();
}

function playSample(trackIdx, time, accent) {
    const track = TRACKS[trackIdx];
    const buf = buffers[currentKit + '/' + track.file];
    if (!buf || trackMutes[trackIdx]) return;
    const source = actx.createBufferSource();
    source.buffer = buf;
    source.connect(trackGains[trackIdx]);
    const vol = accent ? 1.0 : trackVolumes[trackIdx];
    trackGains[trackIdx].gain.setValueAtTime(vol, time);
    source.start(time);

    // Flash the drum icon for this track
    const icon = document.querySelector(`.drum-icon[data-track="${trackIdx}"]`);
    if (icon) {
        icon.classList.add('flash');
        setTimeout(() => icon.classList.remove('flash'), 120);
    }

    // Pikachu reacts to the music
    const n = track.name.toLowerCase();
    const pikaL = document.querySelector('.pikachu-left');
    const pikaR = document.querySelector('.pikachu-right');
    if (n.includes('kick')) {
        // Kick = both Pikachus squish/bounce
        pikaL.classList.remove('bounce','wiggle');
        pikaR.classList.remove('jump','wiggle');
        void pikaL.offsetWidth;
        pikaL.classList.add('bounce');
        pikaR.classList.add('bounce');
        setTimeout(() => { pikaL.classList.remove('bounce'); pikaR.classList.remove('bounce'); }, 100);
    } else if (n.includes('snare') || n.includes('clap') || n.includes('rim')) {
        // Snare = right Pikachu jumps
        pikaR.classList.remove('jump','bounce','wiggle');
        void pikaR.offsetWidth;
        pikaR.classList.add('jump');
        setTimeout(() => pikaR.classList.remove('jump'), 120);
    } else if (n.includes('hat') || n.includes('ride') || n.includes('cymbal')) {
        // Hat/ride/cymbal = both wiggle
        pikaL.classList.remove('bounce','wiggle');
        pikaR.classList.remove('jump','wiggle');
        void pikaL.offsetWidth;
        pikaL.classList.add('wiggle');
        pikaR.classList.add('wiggle');
        setTimeout(() => { pikaL.classList.remove('wiggle'); pikaR.classList.remove('wiggle'); }, 80);
    } else if (n.includes('tom') || n.includes('floor')) {
        // Toms = left Pikachu bounces
        pikaL.classList.remove('bounce','wiggle');
        void pikaL.offsetWidth;
        pikaL.classList.add('bounce');
        setTimeout(() => pikaL.classList.remove('bounce'), 100);
    }
}

// ============================================
// BUILD UI
// ============================================
function buildGrid() {
    const grid = document.getElementById('grid');
    const beatRow = document.getElementById('beatRow');
    const phRow = document.getElementById('playheadRow');
    grid.innerHTML = '';
    beatRow.innerHTML = '';
    phRow.innerHTML = '';

    for (let s = 0; s < STEPS; s++) {
        if (s > 0 && s % 4 === 0) {
            const gap = document.createElement('div');
            gap.className = 'beat-group-gap';
            beatRow.appendChild(gap);
            const phGap = document.createElement('div');
            phGap.className = 'ph-group-gap';
            phRow.appendChild(phGap);
        }
        const num = document.createElement('div');
        num.className = 'beat-num' + (s % 4 === 0 ? ' group-start' : '');
        num.textContent = s + 1;
        beatRow.appendChild(num);
        const ph = document.createElement('div');
        ph.className = 'ph-cell';
        ph.dataset.step = s;
        phRow.appendChild(ph);
    }

    for (let t = 0; t < TRACKS.length; t++) {
        const row = document.createElement('div');
        row.className = 'track';

        const label = document.createElement('div');
        label.className = 'track-label';

        // Drum piece icon
        const iconDiv = document.createElement('div');
        iconDiv.className = 'drum-icon';
        iconDiv.dataset.track = t;
        iconDiv.innerHTML = getDrumIcon(TRACKS[t].name);

        // Mute button (X when muted, empty when active)
        const mute = document.createElement('div');
        mute.className = 'track-mute' + (trackMutes[t] ? ' muted' : '');
        mute.addEventListener('click', () => {
            trackMutes[t] = !trackMutes[t];
            mute.classList.toggle('muted', trackMutes[t]);
        });

        const vol = document.createElement('input');
        vol.type = 'range';
        vol.className = 'track-vol';
        vol.min = 0; vol.max = 100; vol.value = trackVolumes[t] * 100;
        vol.addEventListener('input', () => { trackVolumes[t] = vol.value / 100; });

        const nameSpan = document.createElement('span');
        nameSpan.textContent = TRACKS[t].name;

        label.appendChild(iconDiv);
        label.appendChild(mute);
        label.appendChild(vol);
        label.appendChild(nameSpan);
        row.appendChild(label);

        const steps = document.createElement('div');
        steps.className = 'steps';

        for (let s = 0; s < STEPS; s++) {
            if (s > 0 && s % 4 === 0) {
                const gap = document.createElement('div');
                gap.className = 'step-group-gap';
                steps.appendChild(gap);
            }
            const step = document.createElement('div');
            step.className = 'step';
            step.dataset.track = t;
            step.dataset.step = s;

            const dot = document.createElement('div');
            dot.className = 'step-dot';
            step.appendChild(dot);

            step.addEventListener('click', (e) => {
                const pat = patterns()[currentPattern][t];
                if (pat[s] === 0) {
                    pat[s] = 1;
                    step.classList.add('on');
                    step.classList.remove('accent');
                    if (actx.state === 'suspended') actx.resume();
                    playSample(t, actx.currentTime, false);
                } else if (pat[s] === 1 && e.shiftKey) {
                    pat[s] = 2;
                    step.classList.add('on', 'accent');
                } else {
                    pat[s] = 0;
                    step.classList.remove('on', 'accent');
                }
            });

            steps.appendChild(step);
        }
        row.appendChild(steps);

        grid.appendChild(row);
    }
}

function refreshGrid() {
    const pat = patterns()[currentPattern];
    document.querySelectorAll('.step').forEach(el => {
        const t = parseInt(el.dataset.track);
        const s = parseInt(el.dataset.step);
        const val = pat[t][s];
        el.classList.toggle('on', val > 0);
        el.classList.toggle('accent', val === 2);
    });
}

// ============================================
// SEQUENCER
// ============================================
function getSwingDelay(step) {
    if (step % 2 === 1) {
        return (swing / 100) * (60 / bpm / 4);
    }
    return 0;
}

function nextStep() {
    const secondsPer16th = 60 / bpm / 4;

    while (nextStepTime < actx.currentTime + 0.1) {
        currentStep = (currentStep + 1) % STEPS;
        const swingDelay = getSwingDelay(currentStep);
        const time = nextStepTime + swingDelay;

        const pat = patterns()[currentPattern];
        for (let t = 0; t < TRACKS.length; t++) {
            if (pat[t][currentStep] > 0) {
                playSample(t, time, pat[t][currentStep] === 2);
            }
        }

        const step = currentStep;
        setTimeout(() => updatePlayhead(step), (time - actx.currentTime) * 1000);

        nextStepTime += secondsPer16th;
    }

    timerID = setTimeout(nextStep, 25);
}

function updatePlayhead(step) {
    document.querySelectorAll('.ph-cell').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.step) === step);
    });
    document.querySelectorAll('.step.current').forEach(el => el.classList.remove('current'));
    document.querySelectorAll(`.step[data-step="${step}"]`).forEach(el => el.classList.add('current'));
    document.getElementById('stepDisplay').textContent = 'STEP ' + (step + 1);
}

function startSequencer() {
    if (playing) return;
    if (actx.state === 'suspended') actx.resume();
    playing = true;
    currentStep = -1;
    nextStepTime = actx.currentTime;
    document.getElementById('btnPlay').classList.add('play-on');
    nextStep();
}

function stopSequencer() {
    playing = false;
    if (timerID) clearTimeout(timerID);
    timerID = null;
    document.getElementById('btnPlay').classList.remove('play-on');
    document.querySelectorAll('.ph-cell').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.step.current').forEach(el => el.classList.remove('current'));
    document.getElementById('stepDisplay').textContent = 'STEP --';
}

// ============================================
// UI EVENTS
// ============================================
document.getElementById('btnPlay').addEventListener('click', () => {
    playing ? stopSequencer() : startSequencer();
});
document.getElementById('btnStop').addEventListener('click', stopSequencer);
document.getElementById('btnClear').addEventListener('click', () => {
    patterns()[currentPattern].forEach(t => t.fill(0));
    refreshGrid();
});
document.getElementById('btnRandom').addEventListener('click', () => {
    const pat = patterns()[currentPattern];
    let kickIdx = -1, snareIdx = -1, hatIdx = -1;
    for (let t = 0; t < TRACKS.length; t++) {
        const n = TRACKS[t].name.toLowerCase();
        if (kickIdx < 0 && n.includes('kick')) kickIdx = t;
        if (snareIdx < 0 && (n.includes('snare') || n.includes('clap'))) snareIdx = t;
        if (hatIdx < 0 && n.includes('hat')) hatIdx = t;
    }
    pat.forEach(t => t.fill(0));
    if (kickIdx >= 0) {
        pat[kickIdx][0] = 1; pat[kickIdx][8] = 1;
        for (let s = 0; s < STEPS; s++) { if (Math.random() < 0.15) pat[kickIdx][s] = 1; }
    }
    if (snareIdx >= 0) {
        pat[snareIdx][4] = 1; pat[snareIdx][12] = 1;
        for (let s = 0; s < STEPS; s++) { if (Math.random() < 0.1) pat[snareIdx][s] = 1; }
    }
    if (hatIdx >= 0) {
        for (let s = 0; s < STEPS; s++) { if (Math.random() < 0.6) pat[hatIdx][s] = 1; }
    }
    for (let t = 0; t < TRACKS.length; t++) {
        if (t === kickIdx || t === snareIdx || t === hatIdx) continue;
        for (let s = 0; s < STEPS; s++) { if (Math.random() < 0.08) pat[t][s] = 1; }
    }
    refreshGrid();
});
document.getElementById('btnCopy').addEventListener('click', () => {
    const pat = patterns()[currentPattern];
    patternClipboard = pat.map(t => new Uint8Array(t));
    document.getElementById('btnCopy').style.borderColor = '#FFCB05';
    document.getElementById('btnCopy').style.color = '#FFCB05';
    setTimeout(() => {
        document.getElementById('btnCopy').style.borderColor = '';
        document.getElementById('btnCopy').style.color = '';
    }, 400);
});
document.getElementById('btnPaste').addEventListener('click', () => {
    if (!patternClipboard) return;
    const pat = patterns()[currentPattern];
    const len = Math.min(pat.length, patternClipboard.length);
    for (let t = 0; t < len; t++) {
        pat[t].set(patternClipboard[t]);
    }
    for (let t = len; t < pat.length; t++) {
        pat[t].fill(0);
    }
    refreshGrid();
    document.getElementById('btnPaste').style.borderColor = '#FFCB05';
    document.getElementById('btnPaste').style.color = '#FFCB05';
    setTimeout(() => {
        document.getElementById('btnPaste').style.borderColor = '';
        document.getElementById('btnPaste').style.color = '';
    }, 400);
});

document.getElementById('tempoInput').addEventListener('change', (e) => {
    bpm = Math.max(40, Math.min(300, parseInt(e.target.value) || 120));
});
document.getElementById('swingSlider').addEventListener('input', (e) => {
    swing = parseInt(e.target.value);
    document.getElementById('swingVal').textContent = swing + '%';
});
document.getElementById('masterVol').addEventListener('input', (e) => {
    masterGain.gain.value = e.target.value / 100;
});

// Pattern switching
document.querySelectorAll('.pat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        currentPattern = parseInt(btn.dataset.pat);
        document.querySelectorAll('.pat-btn').forEach(b => b.classList.remove('active-pat'));
        btn.classList.add('active-pat');
        refreshGrid();
    });
});

// Kit dropdown
document.getElementById('kitSelected').addEventListener('click', () => {
    document.getElementById('kitMenu').classList.toggle('open');
});
document.querySelectorAll('.kit-option').forEach(opt => {
    opt.addEventListener('click', () => {
        document.getElementById('kitMenu').classList.remove('open');
        document.querySelectorAll('.kit-option').forEach(o => o.classList.remove('active-kit'));
        opt.classList.add('active-kit');
        document.getElementById('kitSelected').textContent = opt.textContent;
        switchKit(opt.dataset.kit);
    });
});
document.addEventListener('click', (e) => {
    if (!e.target.closest('.kit-dropdown')) document.getElementById('kitMenu').classList.remove('open');
});

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === ' ') { e.preventDefault(); playing ? stopSequencer() : startSequencer(); }
});

// Scale to viewport
function scaleToFit() {
    const wrap = document.getElementById('scaleWrap');
    wrap.style.transform = 'none';
    const w = wrap.scrollWidth;
    const h = wrap.scrollHeight;
    const scale = Math.min(window.innerWidth / w, window.innerHeight / h, 1) * 0.96;
    wrap.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', scaleToFit);

// ============================================
// INIT
// ============================================
for (let t = 0; t < TRACKS.length; t++) {
    const g = actx.createGain();
    g.gain.value = trackVolumes[t];
    g.connect(masterGain);
    trackGains.push(g);
}

// Add flash style for drum icons
const flashStyle = document.createElement('style');
flashStyle.textContent = '.drum-icon.flash svg circle, .drum-icon.flash svg ellipse, .drum-icon.flash svg rect, .drum-icon.flash svg polygon, .drum-icon.flash svg line { stroke: #2563EB !important; fill: #2563EB !important; } .drum-icon.flash { filter: drop-shadow(0 0 6px #2563EB); transform: scale(1.2); transition: transform 0.05s; }';
document.head.appendChild(flashStyle);

buildGrid();
loadSamples().then(() => {
    document.getElementById('stepDisplay').textContent = 'READY';
    setTimeout(scaleToFit, 50);
    // Preload all other kit samples in background
    (async function() {
        for (const kitId of Object.keys(KITS)) {
            if (kitId === currentKit) continue;
            const kit = KITS[kitId];
            const url = SAMPLE_BASE + kit.path;
            for (const track of kit.tracks) {
                const key = kitId + '/' + track.file;
                if (buffers[key]) continue;
                try {
                    const resp = await fetch(url + track.file);
                    const ab = await resp.arrayBuffer();
                    buffers[key] = await actx.decodeAudioData(ab);
                } catch(e) {}
            }
        }
    })();
});
